<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Danforth Suits" />
<title>Danforth Suits — Inventory Lookup</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #ffffff;
    --bg2:      #f5f5f5;
    --bg3:      #ebebeb;
    --text:     #111111;
    --text2:    #555555;
    --text3:    #999999;
    --border:   rgba(0,0,0,0.12);
    --border2:  rgba(0,0,0,0.22);
    --radius:   10px;
    --green-bg: #eaf3de; --green-bd: #97c459; --green-tx: #27500a;
    --yellow-bg:#faeeda; --yellow-bd:#ef9f27; --yellow-tx:#633806;
    --red-bg:   #fcebeb; --red-bd:   #f09595; --red-tx:   #a32d2d;
    --blue-bg:  #e6f1fb; --blue-tx:  #0c447c;
    --teal-bg:  #e1f5ee; --teal-tx:  #085041;
    --amber-bg: #faeeda; --amber-tx: #633806;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:     #1a1a1a; --bg2:   #252525; --bg3:   #303030;
      --text:   #f0f0f0; --text2: #aaaaaa; --text3: #666666;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --green-bg:#173404; --green-bd:#639922; --green-tx:#c0dd97;
      --yellow-bg:#412402; --yellow-bd:#ba7517; --yellow-tx:#fac775;
      --red-bg:#501313; --red-bd:#e24b4a; --red-tx:#f7c1c1;
      --blue-bg:#042c53; --blue-tx:#b5d4f4;
      --teal-bg:#04342c; --teal-tx:#9fe1cb;
      --amber-bg:#412402; --amber-tx:#fac775;
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg2);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 2rem;
  }
  header {
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    padding: 14px 16px 10px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .logo {
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .search-row {
    display: flex;
    gap: 8px;
  }
  .search-row input {
    flex: 1;
    font-size: 16px;
    padding: 10px 14px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    background: var(--bg2);
    color: var(--text);
    outline: none;
    -webkit-appearance: none;
  }
  .search-row input:focus {
    border-color: #378add;
    box-shadow: 0 0 0 3px rgba(55,138,221,0.15);
  }
  .search-row button {
    padding: 10px 18px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    background: var(--text);
    color: var(--bg);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .search-row button:active { opacity: 0.75; transform: scale(0.97); }

  .quick-wrap {
    padding: 10px 16px 0;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .qbtn {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 999px;
    border: 0.5px solid var(--border2);
    background: var(--bg);
    color: var(--text2);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .qbtn:active { background: var(--bg3); }

  .status-bar {
    padding: 10px 16px 4px;
    font-size: 13px;
    color: var(--text3);
  }
  .results { padding: 0 16px; }

  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .card-header { margin-bottom: 12px; }
  .card-name { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .card-sku  { font-size: 12px; color: var(--text3); margin-bottom: 8px; font-family: monospace; }
  .badges { display: flex; flex-wrap: wrap; gap: 5px; }
  .badge {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 999px;
  }
  .b-brand  { background: var(--teal-bg);  color: var(--teal-tx); }
  .b-fit    { background: var(--blue-bg);  color: var(--blue-tx); }
  .b-pieces { background: var(--amber-bg); color: var(--amber-tx); }

  .sizes-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 6px;
    margin-bottom: 12px;
  }
  .sz {
    text-align: center;
    border-radius: 8px;
    padding: 7px 2px;
    border: 0.5px solid var(--border);
  }
  .sz-label { font-size: 10px; color: var(--text3); margin-bottom: 3px; }
  .sz-qty   { font-size: 17px; font-weight: 500; }
  .sz-in    { background: var(--green-bg);  border-color: var(--green-bd); }
  .sz-in  .sz-label { color: var(--green-tx); opacity: 0.7; }
  .sz-in  .sz-qty   { color: var(--green-tx); }
  .sz-low   { background: var(--yellow-bg); border-color: var(--yellow-bd); }
  .sz-low .sz-label { color: var(--yellow-tx); opacity: 0.7; }
  .sz-low .sz-qty   { color: var(--yellow-tx); }
  .sz-none  { background: var(--bg2); }
  .sz-none .sz-label { color: var(--text3); }
  .sz-none .sz-qty   { color: var(--text3); }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 0.5px solid var(--border);
    padding-top: 10px;
    font-size: 13px;
    color: var(--text2);
  }
  .card-total { font-size: 15px; font-weight: 500; color: var(--text); }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text3);
    font-size: 15px;
  }
  .empty-state .icon {
    font-size: 36px;
    margin-bottom: 12px;
    opacity: 0.4;
  }
  .error-card {
    background: var(--red-bg);
    border: 0.5px solid var(--red-bd);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--red-tx);
    font-size: 14px;
    margin-bottom: 12px;
  }
  .error-card .etitle { font-weight: 500; margin-bottom: 4px; }
  .loading {
    text-align: center;
    padding: 2rem;
    color: var(--text3);
    font-size: 14px;
  }
  .config-bar {
    padding: 8px 16px;
    background: var(--amber-bg);
    border-bottom: 0.5px solid var(--yellow-bd);
    font-size: 12px;
    color: var(--amber-tx);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .config-bar a {
    color: var(--amber-tx);
    font-weight: 500;
    text-decoration: underline;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- ── CONFIG: paste your Apps Script Web App URL here ── -->
<script>
  const APPS_SCRIPT_URL = 'YOUR_APPS_SCRIPT_URL_HERE';
  const DEMO_MODE = APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE';
</script>

<header>
  <div class="logo">Danforth Suits</div>
  <div class="search-row">
    <input type="text" id="skuInput"
      placeholder="SKU or brand (e.g. DLM-601)"
      autocomplete="off" autocorrect="off"
      autocapitalize="characters" spellcheck="false" />
    <button onclick="doSearch()">Search</button>
  </div>
</header>

<div id="configBar" style="display:none" class="config-bar">
  <span>Demo mode — not connected to your Sheet</span>
  <a onclick="showSetup()">How to connect</a>
</div>

<div class="quick-wrap">
  <span class="qbtn" onclick="q('DAN21')">Dan21</span>
  <span class="qbtn" onclick="q('TUR')">Turan</span>
  <span class="qbtn" onclick="q('BFD')">Belford</span>
  <span class="qbtn" onclick="q('ZIV')">Ziver</span>
  <span class="qbtn" onclick="q('MRC')">Marco</span>
  <span class="qbtn" onclick="q('DLM')">Delmont</span>
  <span class="qbtn" onclick="q('CST')">Costumen</span>
  <span class="qbtn" onclick="q('WRT')">Worthel</span>
  <span class="qbtn" onclick="q('PLM')">Polim Pier</span>
</div>

<div class="status-bar" id="statusBar"></div>
<div class="results" id="results">
  <div class="empty-state">
    <div class="icon">&#x1F454;</div>
    <div>Search a SKU or tap a brand above</div>
  </div>
</div>

<script>
const SIZES = [46,48,50,52,54,56,58,60,62,64];

// ── Demo data (used when APPS_SCRIPT_URL is not set) ──
const DEMO = [
  { sku:'DLM-601-3P-CL', name:'Delmont Classic Charcoal', brand:'Delmont', fit:'Classic', pieces:'3P', stock:{46:2,48:3,50:1,52:0,54:2,56:0,58:1,60:0,62:0,64:0} },
  { sku:'DLM-602-2P-SL', name:'Delmont Slim Navy',        brand:'Delmont', fit:'Slim',    pieces:'2P', stock:{46:0,48:1,50:3,52:2,54:1,56:1,58:0,60:0,62:0,64:0} },
  { sku:'ZIV-409-3P-RG', name:'Ziver Regular Black',      brand:'Ziver',   fit:'Regular', pieces:'3P', stock:{46:0,48:2,50:0,52:1,54:3,56:2,58:1,60:0,62:0,64:0} },
  { sku:'TUR-115-2P-SL', name:'Turan Slim Stripe',        brand:'Turan',   fit:'Slim',    pieces:'2P', stock:{46:1,48:1,50:2,52:2,54:0,56:0,58:0,60:1,62:0,64:0} },
  { sku:'TUR-118-3P-CL', name:'Turan Classic Texture',    brand:'Turan',   fit:'Classic', pieces:'3P', stock:{46:0,48:0,50:1,52:3,54:2,56:1,58:0,60:0,62:0,64:0} },
  { sku:'PLM-1103-2P-SL',name:'Polim Pier Slim Check',    brand:'Polim Pier',fit:'Slim',  pieces:'2P', stock:{46:2,48:0,50:0,52:1,54:1,56:2,58:1,60:0,62:0,64:0} },
  { sku:'DAN21-028-3P-RG',name:'Dan21 Regular Solid',     brand:'Dan21',   fit:'Regular', pieces:'3P', stock:{46:0,48:1,50:2,52:0,54:1,56:0,58:0,60:0,62:0,64:0} },
  { sku:'BFD-227-2P-CL', name:'Belford Classic Pinstripe',brand:'Belford', fit:'Classic', pieces:'2P', stock:{46:1,48:2,50:1,52:1,54:0,56:0,58:0,60:0,62:0,64:0} },
  { sku:'MRC-501-3P-CL', name:'Marco Classic Grey',       brand:'Marco',   fit:'Classic', pieces:'3P', stock:{46:0,48:0,50:2,52:1,54:0,56:2,58:0,60:1,62:0,64:0} },
  { sku:'WRT-813-2P-SL', name:'Worthel Slim Charcoal',    brand:'Worthel', fit:'Slim',    pieces:'2P', stock:{46:1,48:2,50:0,52:1,54:2,56:1,58:0,60:0,62:0,64:0} },
];

function q(val) {
  document.getElementById('skuInput').value = val;
  doSearch();
}

function showSetup() {
  alert('1. Open your Suits Google Sheet\n2. Extensions → Apps Script\n3. Paste the doGet() code\n4. Deploy → New deployment → Web App\n5. Set access to "Anyone"\n6. Copy the URL and paste it into this file replacing YOUR_APPS_SCRIPT_URL_HERE');
}

async function doSearch() {
  const query = document.getElementById('skuInput').value.trim().toUpperCase();
  const resultsEl = document.getElementById('results');
  const statusEl  = document.getElementById('statusBar');

  if (!query) {
    resultsEl.innerHTML = '<div class="empty-state"><div class="icon">&#x1F454;</div><div>Enter a SKU or brand above</div></div>';
    statusEl.textContent = '';
    return;
  }

  if (DEMO_MODE) {
    document.getElementById('configBar').style.display = 'flex';
    const matches = DEMO.filter(s =>
      s.sku.includes(query) || s.brand.toUpperCase().includes(query) || s.name.toUpperCase().includes(query)
    );
    renderResults(matches, statusEl, resultsEl, true);
    return;
  }

  resultsEl.innerHTML = '<div class="loading">Searching...</div>';
  statusEl.textContent = '';

  try {
    const url = `${APPS_SCRIPT_URL}?action=search&q=${encodeURIComponent(query)}`;
    const res  = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    renderResults(data.results || [], statusEl, resultsEl, false);
  } catch (err) {
    resultsEl.innerHTML = `<div class="error-card"><div class="etitle">Connection error</div><div>${err.message}</div></div>`;
    statusEl.textContent = '';
  }
}

function renderResults(results, statusEl, resultsEl, isDemo) {
  if (results.length === 0) {
    statusEl.textContent = '';
    resultsEl.innerHTML = '<div class="empty-state"><div class="icon">&#x1F50D;</div><div>No styles found</div></div>';
    return;
  }
  statusEl.textContent = `${results.length} style${results.length !== 1 ? 's' : ''} found${isDemo ? ' (demo data)' : ''}`;
  resultsEl.innerHTML = results.map(renderCard).join('');
}

function renderCard(s) {
  const stock = s.stock || {};
  const total = Object.values(stock).reduce((a,b)=>a+b,0);
  const cells = SIZES.map(sz => {
    const qty = stock[sz] || 0;
    const cls = qty === 0 ? 'sz-none' : qty === 1 ? 'sz-low' : 'sz-in';
    return `<div class="sz ${cls}"><div class="sz-label">${sz}</div><div class="sz-qty">${qty === 0 ? '—' : qty}</div></div>`;
  }).join('');

  const badges = [
    s.brand  ? `<span class="badge b-brand">${s.brand}</span>`  : '',
    s.fit    ? `<span class="badge b-fit">${s.fit}</span>`      : '',
    s.pieces ? `<span class="badge b-pieces">${s.pieces}</span>`: '',
  ].join('');

  return `
    <div class="card">
      <div class="card-header">
        <div class="card-name">${s.name || s.sku}</div>
        <div class="card-sku">${s.sku}</div>
        <div class="badges">${badges}</div>
      </div>
      <div class="sizes-grid">${cells}</div>
      <div class="card-footer">
        <span>Total in stock</span>
        <span class="card-total">${total} units</span>
      </div>
    </div>`;
}

document.getElementById('skuInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

window.addEventListener('load', () => {
  if (DEMO_MODE) document.getElementById('configBar').style.display = 'flex';
});
</script>
</body>
</html>
